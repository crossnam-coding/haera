<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>해라 — ② Bento / Modern Pop</title><meta name="robots" content="noindex">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  :root{--ink:#1c1630;--muted:#6f6790;--card:rgba(255,255,255,.72);--accent:#7b5bff;--accent2:#ff5fa2}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Pretendard",system-ui,sans-serif;color:var(--ink);min-height:100vh;
    background:linear-gradient(150deg,#ffe0f0 0%,#e2d5ff 34%,#d3ecff 66%,#e9fff0 100%);background-attachment:fixed;padding:22px}
  a{color:inherit;text-decoration:none}
  .top{display:flex;justify-content:space-between;align-items:center;max-width:1180px;margin:6px auto 20px;padding:0 6px}
  .brand{font-weight:800;font-size:22px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .top .l{display:flex;gap:18px;font-size:14px;font-weight:600;color:var(--muted)}
  .bento{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:150px;gap:16px}
  @media(max-width:820px){.bento{grid-template-columns:repeat(2,1fr)}}
  .c{background:var(--card);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.6);border-radius:26px;padding:22px;box-shadow:0 20px 50px -30px rgba(90,50,120,.5);overflow:hidden;position:relative;transition:.25s}
  .c:hover{transform:translateY(-4px);box-shadow:0 30px 60px -30px rgba(90,50,120,.6)}
  .lbl{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--accent)}
  /* hero tile */
  .hero{grid-column:span 2;grid-row:span 2;color:#fff;display:flex;flex-direction:column;justify-content:flex-end;
    background:url('img/haera-hero.jpg') center 18%/cover;border:0}
  .hero::after{content:"";position:absolute;inset:0;background:linear-gradient(0deg,rgba(20,10,30,.8),transparent 55%)}
  .hero>*{position:relative;z-index:2}
  .hero .k{font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;opacity:.9}
  .hero h1{font-size:clamp(46px,7vw,84px);font-weight:800;letter-spacing:-.02em;line-height:.95;margin:6px 0}
  .hero p{font-size:14px;opacity:.92;max-width:320px}
  /* latest tile */
  .latest{grid-column:span 2;display:flex;gap:18px;align-items:center}
  .latest img{width:104px;height:104px;border-radius:16px;object-fit:cover;box-shadow:0 12px 26px -14px rgba(90,50,120,.6)}
  .latest h3{font-size:26px;font-weight:800;margin:4px 0 2px}
  .latest .y{color:var(--muted);font-size:13px;font-weight:600}
  .latest .go{display:inline-block;margin-top:10px;background:linear-gradient(100deg,var(--accent),var(--accent2));color:#fff;font-size:12px;font-weight:800;padding:8px 16px;border-radius:100px}
  /* video tile */
  .vid{grid-column:span 2;grid-row:span 2;padding:0;background:#000}
  .vid img{width:100%;height:100%;object-fit:cover;opacity:.9}
  .vid .ov{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;padding:20px;z-index:2;color:#fff;background:linear-gradient(0deg,rgba(0,0,0,.6),transparent 40%)}
  .vid .play{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.9);color:#111;display:flex;align-items:center;justify-content:center;font-size:16px;align-self:flex-start}
  /* music tile */
  .music .covers{display:flex;gap:8px;margin-top:12px}
  .music .covers img{width:48px;height:48px;border-radius:10px;object-fit:cover}
  .music .big{font-size:30px;font-weight:800;margin-top:6px}
  /* stat */
  .stat{display:flex;flex-direction:column;justify-content:center}
  .stat .num{font-size:40px;font-weight:800;background:linear-gradient(120deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1}
  .stat small{color:var(--muted);font-weight:600;font-size:12px;letter-spacing:.06em}
  /* social tile */
  .soc{grid-column:span 2;display:flex;flex-direction:column;justify-content:center}
  .soc .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .soc a{background:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.8);padding:9px 15px;border-radius:100px;font-weight:700;font-size:13px;transition:.2s}
  .soc a:hover{color:var(--accent);transform:translateY(-2px)}
  /* gallery tile */
  .gal{padding:0}
  .gal img{width:100%;height:100%;object-fit:cover;object-position:center 22%}
</style></head><body>
